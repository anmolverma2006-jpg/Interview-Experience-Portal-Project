services:
  - type: web
    name: interview-experience-portal
    env: node
    plan: free
    buildCommand: npm install && npm install --prefix frontend && npm run build --prefix frontend
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: interview-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true

databases:
  - name: interview-db
    plan: free
    postgresMajorVersion: 15
